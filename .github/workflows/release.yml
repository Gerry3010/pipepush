name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build CLI + MCP server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build -ldflags "-s -w -X main.version=$VERSION" \
            -o pipepush-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/pipepush
          go build -ldflags "-s -w -X main.version=$VERSION" \
            -o pipepush-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/pipepush-mcp
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            pipepush-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            pipepush-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/gerry3010/pipepush:latest
            ghcr.io/gerry3010/pipepush:${{ github.ref_name }}
